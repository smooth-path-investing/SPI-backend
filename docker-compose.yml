services:
  api-dev:
    build:
      context: .
      target: development
    command: ["npm", "run", "dev"]
    container_name: spi-backend-dev
    env_file:
      - .env.development
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      retries: 3
      start_period: 15s
      timeout: 5s
    init: true
    ports:
      - "3000:3000"
    profiles: ["dev"]
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules

  api-prod:
    build:
      context: .
      target: production
    container_name: spi-backend-prod
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      retries: 3
      start_period: 15s
      timeout: 5s
    init: true
    ports:
      - "3000:3000"
    profiles: ["prod"]
    restart: unless-stopped
